<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATHENA ORACLE</title>

<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: radial-gradient(circle at top, #0b0b14, #05050a);
  overflow: hidden;
}

/* MARBLE TEMPLE */
.marble {
  background: linear-gradient(135deg, #f5f1e6 0%, #d8d2c4 100%);
}

/* GOLD DIVINE BORDER */
.greek-border {
  border: 2px solid #d4af37;
  border-radius: 14px;
  position: relative;
}

/* ANCIENT GREEK GLYPH BORDER EFFECT */
.greek-border::before {
  content: "Ω Θ Α Σ Φ Ψ Λ Δ Ω Θ Α Σ Φ Ψ Λ Δ";
  position: absolute;
  top: -10px;
  left: 10px;
  right: 10px;
  font-size: 10px;
  letter-spacing: 4px;
  color: rgba(212, 175, 55, 0.35);
  white-space: nowrap;
  overflow: hidden;
}

.greek-border::after {
  content: "Δ Ψ Φ Σ Α Θ Ω Δ Ψ Φ Σ Α Θ Ω";
  position: absolute;
  bottom: -10px;
  left: 10px;
  right: 10px;
  font-size: 10px;
  letter-spacing: 4px;
  color: rgba(212, 175, 55, 0.25);
  white-space: nowrap;
  overflow: hidden;
}

/* DIVINE GLOW */
.divine-glow {
  box-shadow: 0 0 20px rgba(212, 175, 55, 0.35),
              0 0 80px rgba(212, 175, 55, 0.1);
}

/* ORACLE TEXT */
.oracle-text {
  color: #dabe85;
  text-shadow: 0 0 10px rgba(212, 175, 55, 0.35);
  font-family: Georgia, serif;
}

/* TEMPLE PULSE */
@keyframes divinePulse {
  0% { box-shadow: 0 0 10px rgba(212,175,55,0.2); }
  50% { box-shadow: 0 0 25px rgba(212,175,55,0.4); }
  100% { box-shadow: 0 0 10px rgba(212,175,55,0.2); }
}

.divine-pulse {
  animation: divinePulse 4s infinite;
}

/* OWL FLOAT */
@keyframes owlFloat {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-4px); }
  100% { transform: translateY(0px); }
}

.owl {
  animation: owlFloat 3s infinite;
}
</style>
</head>

<body x-data="Writing()" class="flex items-center justify-center h-screen p-2">

<div class="relative w-full max-w-md h-full marble greek-border divine-glow divine-pulse flex flex-col">

  <!-- TOP BAR -->
  <div class="bg-[#111122] border-b border-[#d4af37] text-center py-2 oracle-text text-lg">
    🦉 ATHENA ORACLE Δ Ω Θ Σ Ψ
  </div>

  <!-- BUTTONS -->
  <div class="flex border-b border-[#d4af37] bg-[#1a1a2e]">

    <button @click="state = (state!='Sys')?'Sys':'Ter'"
      class="flex-1 py-2 oracle-text hover:bg-[#2a2a44]">
      ⚔ SYSTEM
    </button>

    <button @click="Mute()"
      class="flex-1 py-2 oracle-text hover:bg-[#2a2a44]">
      🔕 SILENCE
    </button>

    <button @click="Clear()"
      class="flex-1 py-2 oracle-text hover:bg-[#2a2a44]">
      🏛 PURGE
    </button>
  </div>

  <!-- TERMINAL -->
  <div class="flex-1 flex flex-col p-2 overflow-hidden" x-show="state=='Ter'">

    <!-- OWL COMPANION -->
    <div class="text-center text-3xl owl oracle-text mb-1">
      🦉
    </div>

    <pre x-text="readOnlyMemory"
      class="flex-1 overflow-y-auto oracle-text font-serif"
      style="white-space: pre-wrap;"></pre>

    <div class="flex gap-2 mt-2">

      <input x-model="answer"
        @keydown.enter.prevent="Main()"
        class="flex-1 p-2 marble greek-border oracle-text font-serif outline-none"
        placeholder="Ask the Oracle...">

      <button @click="Main('Athena')"
        class="px-4 greek-border oracle-text hover:bg-[#2a2a44]">
        ΣEND
      </button>

    </div>
  </div>

  <!-- SYSTEM PANEL -->
  <div class="flex-1 p-3 overflow-auto" x-show="state=='Sys'">

    <div class="flex flex-col gap-3 oracle-text">

      <div class="text-center text-2xl mb-2">
        🏛 ΔELPHIC CONFIGURATION 🏛
      </div>

      <label>Divine Role</label>
      <select x-model="job" class="marble greek-border oracle-text p-2">
        <option>Strategist</option>
        <option>Oracle</option>
        <option>Scholar</option>
        <option>WarCounselor</option>
        <option>KeeperOfKnowledge</option>
        <option>DivineMentor</option>
        <option>AncientArchivist</option>
        <option>GuardianOfWisdom</option>
        <option>TacticalAdvisor</option>
        <option>MysticPhilosopher</option>
      </select>

      <label>Mood</label>
      <select x-model="mood" class="marble greek-border oracle-text p-2">
        <option>Stoic</option>
        <option>Wise</option>
        <option>Stern</option>
        <option>Noble</option>
        <option>Prophetic</option>
        <option>Mysterious</option>
      </select>

      <label>Divine Trait</label>
      <select x-model="divineTrait" class="marble greek-border oracle-text p-2">
        <option>Wisdom</option>
        <option>Strategy</option>
        <option>Justice</option>
        <option>Knowledge</option>
        <option>Prophecy</option>
      </select>

      <label>Style</label>
      <input x-model="style"
        class="marble greek-border oracle-text p-2"
        placeholder="Ancient tone...">

      <label>Expertise</label>
      <input x-model="expertise"
        class="marble greek-border oracle-text p-2"
        placeholder="Knowledge domains...">

      <label>Avoid</label>
      <input x-model="useAvoid"
        class="marble greek-border oracle-text p-2"
        placeholder="Forbidden topics...">

      <button @click="SaveMind()"
        class="mt-2 greek-border oracle-text py-2 hover:bg-[#2a2a44]">
        ΣAVE TO TEMPLE
      </button>

    </div>
  </div>

</div>

<script src="index.js"></script>
</body>
</html>
