<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro AI Terminal</title>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Scanlines */
    .scanlines::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background-image: repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,0) 0px,
        rgba(0,0,0,0) 2px,
        rgba(0,255,0,0.1) 3px
      );
    }

    @keyframes flicker {
      0% { opacity: 0.95; }
      50% { opacity: 1; }
      100% { opacity: 0.96; }
    }

    .flicker {
      animation: flicker 0.15s infinite;
    }
  </style>
</head>
<body x-data="Writing()" class="bg-black flex items-center justify-center h-screen p-2">
  <div class="relative w-full max-w-md h-full bg-[#001100] border-2 border-green-500 rounded-xl flex flex-col shadow-lg scanlines uppercase">

    <!-- Top Bar -->
    <div class="w-full bg-[#002200] border-b-2 border-green-500 text-green-500 font-mono text-center py-1 rounded-t-xl">
      ATHENA
    </div>

    <!-- Buttons Row -->
    <div class="w-full bg-[#002200] flex justify-center border-b-2 border-green-500">
      <button @click=" state= (state != 'Sys') ? 'Sys' : 'Ter', systemTxt= (systemTxt == 'SYSTEM')? 'TERMINAL' : 'SYSTEM' " class="flex-1 text-green-500 font-mono border-l border-green-500 py-1 hover:bg-green-900 transition" x-text="systemTxt"></button>
      <button @click="Mute()" class="flex-1 text-green-500 font-mono border-l border-green-500 py-1 hover:bg-green-900 transition" x-text="muteTxt"> </button>
      <button @click="Clear()" class="flex-1 text-green-500 font-mono border-l border-green-500 py-1 hover:bg-green-900 transition">
        CLEAR
      </button>
    </div>

    <!-- Terminal Output -->
    <div class="flex-1 flex flex-col p-2 overflow-hidden" x-show="state == 'Ter'">
        <!-- Scrollable output -->
        <pre x-text="readOnlyMemory" 
            class="flex-1 overflow-y-auto text-green-500 font-mono flicker break-words" 
            style="white-space: pre-wrap; word-break: break-word;">
        </pre>

        <!-- Input fixed at bottom -->
        <div class="flex mt-2 gap-2">
            <!-- Input takes most of the space -->
            <input x-model="answer" @keydown.enter.prevent="Main()" class="uppercase placeholder-[#005500] flex-1 p-2 bg-[#001100] border-2 border-green-500 rounded font-mono text-green-500 focus:outline-none flicker placeholder:text-xs" 
                    placeholder="Type your command...">

            <!-- Button shares remaining space -->
            <button @click="Main()" class="flex-none px-4 bg-[#002200] border-2 border-green-500 rounded font-mono text-green-500 hover:bg-green-900 transition">
                SEND
            </button>
        </div>

    </div>

    <!-- System -->
    <div class="flex-1 flex flex-col p-2 overflow-auto bg-[#001100] border-2 border-green-500 rounded-lg" x-show="state == 'Sys'">
    
    <div class="flex flex-col gap-3">
        <label for="Job" class="text-green-500 font-mono">Job:</label>
        <select name="Job" x-model="job" class="bg-[#001100] border-2 border-green-500 rounded font-mono text-green-500 p-2 focus:outline-none uppercase">
            <option value="Assistant">Assistant</option>
            <option value="PersonalProductivityAssistant">Personal Productivity Assistant</option>
            <option value="CodingAssistant">Coding Assistant</option>
            <option value="ResearchAssistant">Research Assistant</option>
            <option value="CreativeAssistant">Creative Assistant</option>
            <option value="PersonalFinanceAssistant">Personal Finance Assistant</option>
            <option value="Health&WellnessAssistant">Health & Wellness Assistant</option>
            <option value="Guide">Guide</option>
            <option value="EntertainmentGuide">Entertainment Guide</option>
            <option value="Tutor">Tutor</option>
            <option value="TutorMath">Tutor Math</option>
            <option value="TutorScience">Tutor Science</option>
            <option value="TutorArt">Tutor Art</option>
            <option value="TutorGeography">Tutor Geography</option>
            <option value="TutorHistory">Tutor History</option>
            <option value="TutorSocialStudies">Tutor Social Studies</option>
            <option value="TutorLanguage">Tutor Language</option>
            <option value="TutorEconomics">Tutor Economics</option>
        </select>

        <label for="Mood" class="text-green-500 font-mono">Mood:</label>
        <select name="Mood" x-model="mood"  class="bg-[#001100] border-2 border-green-500 rounded font-mono text-green-500 p-2 focus:outline-none uppercase">
            <option value="Friendly">Friendly</option>
            <option value="Professional">Professional</option>
            <option value="Humorous">Humorous</option>
            <option value="Empathetic">Empathetic</option>
            <option value="Motivational">Motivational</option>
            <option value="Calm">Calm</option>
            <option value="Formal">Formal</option>
            <option value="Curious">Curious</option>
            <option value="Creative">Creative</option>
        </select>

        <label for="Style" class="text-green-500 font-mono">Style:</label>
        <input type="text" class="uppercase placeholder-[#005500] flex-1 p-2 bg-[#001100] border-2 border-green-500 rounded font-mono text-green-500 focus:outline-none flicker placeholder:text-xs"name="Style" x-model="style" placeholder="Enter the style you want her to have...">
        
        <label for="Expertise" class="text-green-500 font-mono">Expertise:</label>
        <input type="text" class="uppercase placeholder-[#005500] flex-1 p-2 bg-[#001100] border-2 border-green-500 rounded font-mono text-green-500 focus:outline-none flicker placeholder:text-xs"name="Expertise" x-model="expertise" placeholder="Enter the Expertise you want her to have...">

        <label for="Avoid" class="text-green-500 font-mono">Avoid:</label>
        <input type="text" class="uppercase placeholder-[#005500] flex-1 p-2 bg-[#001100] border-2 border-green-500 rounded font-mono text-green-500 focus:outline-none flicker placeholder:text-xs"name="Avoid" x-model="useAvoid" placeholder="Enter the thing you want her to avoid talking about...">

        <label for="responsLeng" class="text-green-500 font-mono">Respons Length:</label>
        <select name="responsLeng" x-model="responsLeng"  class="bg-[#001100] border-2 border-green-500 rounded font-mono text-green-500 p-2 focus:outline-none uppercase">
            <option value="Short_10-50">Short</option>
            <option value="Medium_50-250">Medium</option>
            <option value="Large_200-1000">Large</option>
        </select>

        <label for="creativity" class="text-green-500 font-mono">Creativity:</label>
        <select name="creativity" x-model="creativity"  class="bg-[#001100] border-2 border-green-500 rounded font-mono text-green-500 p-2 focus:outline-none uppercase">
            <option value="precise,_no_creativity">Precise</option>
            <option value="balanced,_some_creativity">Balanced</option>
            <option value="creativity,_a_large_value_creativity">Creativity</option>
        </select>

        <label for="QualityOfSpeed" class="text-green-500 font-mono">Quality of Speed:</label>
        <select name="QualityOfSpeed" x-model="sq" class="bg-[#001100] border-2 border-green-500 rounded font-mono text-green-500 p-2 focus:outline-none uppercase">
            <option value="Quality">Quality</option>
            <option value="Speed">Speed</option>
        </select>

        <label for="key" class="text-green-500 font-mono">Gemini API Key:</label>
        <input type="text" class="uppercase placeholder-[#005500] flex-1 p-2 bg-[#001100] border-2 border-green-500 rounded font-mono text-green-500 focus:outline-none flicker placeholder:text-xs"name="key" x-model="apiKey" placeholder="Enter the you Gemini API Key...">

        <label for="ai" class="text-green-500 font-mono">Ollama Model:</label>
        <select name="ai" x-model="aiModel" class="bg-[#001100] border-2 border-green-500 rounded font-mono text-green-500 p-2 focus:outline-none uppercase">
            <option value="llama3">llama3 - General assistant</option>
            <option value="llama3.1">llama3.1 - General assistant</option>
            <option value="llama3.2">llama3.2 - General assistant</option>
            <option value="llama3.3">llama3.3 - General assistant</option>
            <option value="qwen3:7b">qwen3 7b - Coding assistant, research assistant</option>
            <option value="qwen2.5-coder:7b">qwen2.5 coder 7b - Coding assistant</option>
            <option value="gemma4">gemma4 - Fast</option>
            <option value="deepseek-r1:7b">deepseek r1 7b - Research assistant, analytical questions</option>
            <option value="phi4-mini">phi4 mini - tiny</option>
            <option value="mistral">mistral - General chat</option>
        </select>

        <button @click="SaveMind()" class="mt-2 bg-[#002200] border-2 border-green-500 rounded font-mono text-green-500 py-2 hover:bg-green-900 transition">
            SAVE
        </button>
    </div>
    </div>
  </div>
</body>

<script src="index.js"></script>
