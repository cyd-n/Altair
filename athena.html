<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Athena Oracle Terminal</title>

<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: radial-gradient(circle at top, #0d0d14, #05050a);
  overflow: hidden;
}

/* marble temple look */
.marble {
  background: linear-gradient(135deg, #f5f1e6 0%, #d8d2c4 100%);
}

/* gold divine border */
.greek-border {
  border: 2px solid #d4af37;
  border-radius: 14px;
}

/* glowing aura */
.divine-glow {
  box-shadow: 0 0 20px rgba(212, 175, 55, 0.35),
              0 0 60px rgba(212, 175, 55, 0.15);
}

/* oracle text */
.oracle-text {
  color: #dec89a;
  text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
  font-family: Georgia, serif;
}

/* temple pulse */
@keyframes divinePulse {
  0% { box-shadow: 0 0 10px rgba(212,175,55,0.2); }
  50% { box-shadow: 0 0 25px rgba(212,175,55,0.5); }
  100% { box-shadow: 0 0 10px rgba(212,175,55,0.2); }
}

.divine-pulse {
  animation: divinePulse 4s infinite;
}

/* scanline subtle myth effect */
.scanlines::before {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.02),
    rgba(0,0,0,0.02) 2px
  );
}
</style>
</head>

<body x-data="Writing()" class="flex items-center justify-center h-screen p-2">

<div class="relative w-full max-w-md h-full marble greek-border divine-glow divine-pulse flex flex-col scanlines">

  <!-- TOP BAR -->
  <div class="bg-[#111122] border-b border-[#d4af37] text-center py-2 oracle-text text-lg">
    🏛 ATHENA ORACLE
  </div>

  <!-- BUTTONS -->
  <div class="flex border-b border-[#d4af37] bg-[#1a1a2e]">
    <button @click="state = (state!='Sys')?'Sys':'Ter', systemTxt=(systemTxt=='SYSTEM')?'TEMPLE':'SYSTEM'"
      class="flex-1 py-2 oracle-text hover:bg-[#2a2a44]">
      SYSTEM
    </button>

    <button @click="Mute()" class="flex-1 py-2 oracle-text hover:bg-[#2a2a44]">
      SILENCE
    </button>

    <button @click="Clear()" class="flex-1 py-2 oracle-text hover:bg-[#2a2a44]">
      PURGE
    </button>
  </div>

  <!-- TERMINAL -->
  <div class="flex-1 flex flex-col p-2 overflow-hidden" x-show="state=='Ter'">

    <pre x-text="readOnlyMemory"
      class="flex-1 overflow-y-auto oracle-text font-serif"
      style="white-space: pre-wrap;"></pre>

    <div class="flex gap-2 mt-2">
      <input x-model="answer" @keydown.enter.prevent="Main()"
        class="flex-1 p-2 marble greek-border oracle-text font-serif outline-none"
        placeholder="Ask the Oracle...">

      <button @click="Main()"
        class="px-4 greek-border oracle-text hover:bg-[#2a2a44]">
        SEND
      </button>
    </div>
  </div>

  <!-- SYSTEM PANEL -->
  <div class="flex-1 p-3 overflow-auto" x-show="state=='Sys'">

    <div class="flex flex-col gap-3 oracle-text">

      <label>Job (Divine Role)</label>
      <select x-model="job" class="marble greek-border oracle-text p-2">
        <option>Strategist</option>
        <option>Oracle</option>
        <option>Scholar</option>
        <option>WarCounselor</option>
        <option>KeeperOfKnowledge</option>
        <option>DivineMentor</option>
        <option>AncientArchivist</option>
        <option>GuardianOfWisdom</option>
        <option>TacticalAdvisor</option>
        <option>MysticPhilosopher</option>
      </select>

      <label>Mood of Athena</label>
      <select x-model="mood" class="marble greek-border oracle-text p-2">
        <option>Stoic</option>
        <option>Wise</option>
        <option>Stern</option>
        <option>Noble</option>
        <option>Prophetic</option>
        <option>Ancient</option>
        <option>Mysterious</option>
      </select>

      <label>Speech Style</label>
      <select x-model="speechStyle" class="marble greek-border oracle-text p-2">
        <option>FormalOracle</option>
        <option>AncientGreek</option>
        <option>Philosophical</option>
        <option>Poetic</option>
        <option>Cryptic</option>
      </select>

      <label>Divine Trait</label>
      <select x-model="divineTrait" class="marble greek-border oracle-text p-2">
        <option>Wisdom</option>
        <option>Strategy</option>
        <option>Justice</option>
        <option>Knowledge</option>
        <option>Prophecy</option>
      </select>

      <label>Style</label>
      <input x-model="style"
        class="marble greek-border oracle-text p-2"
        placeholder="Ancient tone...">

      <label>Expertise</label>
      <input x-model="expertise"
        class="marble greek-border oracle-text p-2"
        placeholder="Domains of wisdom...">

      <label>Avoid</label>
      <input x-model="useAvoid"
        class="marble greek-border oracle-text p-2"
        placeholder="Forbidden knowledge...">

      <button @click="SaveMind()"
        class="mt-2 greek-border oracle-text py-2 hover:bg-[#2a2a44]">
        SAVE TO TEMPLE
      </button>

    </div>
  </div>

</div>

<script src="index.js"></script>
</body>
</html>
